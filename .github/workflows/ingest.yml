name: Ingest new rulings

on:
  push:
    paths:
      - 'raw/**/*.json'
  # Manual catch-up: re-ingests every raw/dept*/*.json from scratch.
  # Use when something has gone sideways and the parquet has fallen
  # noticeably behind the raw files.
  workflow_dispatch:
    inputs:
      mode:
        description: 'Ingest mode'
        required: true
        default: 'all-raw'
        type: choice
        options:
          - all-raw

# Coalesce a bulk-scrape burst into one ingest. The 60-second sleep below
# is the debounce window: any new push within that window cancels the
# in-flight run (cancel-in-progress: true) and starts a fresh one. The
# last push to land in a quiet ≥60s window is the one that actually
# proceeds, and it picks up every raw file added since the previous bot
# commit — so a 50-file burst is processed in a single pass instead of
# fighting itself in 50 racing parallel ingests.
#
# Push and workflow_dispatch share the same group so they can't race on
# the binary parquet — if you trigger a manual --all-raw repair, pause
# scanning until it finishes (otherwise your push will cancel the repair).
concurrency:
  group: ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Debounce push burst
        if: github.event_name == 'push'
        run: sleep 60

      - uses: actions/checkout@v4
        with:
          # Need history back to the previous bot commit to compute the
          # cumulative file list. 100 covers a couple of days of bulk
          # scrapes; the catch-up branch handles deeper backlogs.
          fetch-depth: 100

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas pyarrow openpyxl holidays

      - name: Ingest and commit updated parquet
        run: |
          MODE="${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'incremental' }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Always work against the freshest origin/master so a parallel
          # human commit doesn't disappear when we push.
          git fetch origin master
          git checkout FETCH_HEAD

          if [ "$MODE" = "all-raw" ]; then
            echo "Catch-up mode: re-ingesting every raw/dept*/*.json"
            python3 ingest.py --all-raw
          else
            # Find every raw JSON added or modified since the last bot
            # commit. This catches up "stranded" files left behind by a
            # cancelled or failed previous run — the next push always
            # re-discovers them via the same diff.
            LAST_BOT=$(git log --author='github-actions\[bot\]' --pretty=format:%H -1 -- tentatives.parquet)

            if [ -z "$LAST_BOT" ]; then
              # No prior bot commit (first run after this workflow lands).
              # Falling all the way back to --all-raw guarantees we don't
              # miss anything historic.
              echo "No prior bot commit found — running --all-raw."
              python3 ingest.py --all-raw
            else
              echo "Diffing against last bot commit $LAST_BOT"
              # --diff-filter=AM: only files that exist in HEAD (added or
              # modified). Excludes deletions so we don't try to ingest a
              # path that no longer exists.
              NEW_FILES=$(git diff --name-only --diff-filter=AM "$LAST_BOT" HEAD -- 'raw/**/*.json' 'raw/*.json')

              if [ -z "$NEW_FILES" ]; then
                echo "No new raw JSON files since last bot commit."
                exit 0
              fi

              echo "Files to ingest:"
              echo "$NEW_FILES"

              for f in $NEW_FILES; do
                if [ ! -f "$f" ]; then
                  echo "  (skip $f — file vanished from working tree)"
                  continue
                fi
                # Pull the dept out of the path (raw/dept<N>/...) so the
                # row gets tagged correctly even if the JSON wrapper is
                # missing the field. The wrapper still wins when present.
                DEPT=$(echo "$f" | sed -n 's|^raw/dept\([0-9]\+\)/.*|\1|p')
                if [ -n "$DEPT" ]; then
                  echo "Ingesting $f (dept $DEPT) …"
                  python3 ingest.py --dept "$DEPT" "$f"
                else
                  echo "Ingesting $f …"
                  python3 ingest.py "$f"
                fi
              done
            fi
          fi

          python3 update-readme.py

          git add tentatives.parquet README.md coverage data

          if git diff --staged --quiet; then
            echo "All rows already present – no parquet changes."
            exit 0
          fi

          git commit -m "Update tentatives.parquet [skip ci]"

          # Push, retrying on transient race conditions (e.g. a human
          # commit landed while we were ingesting). Rebase between
          # attempts so we stay a clean fast-forward.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5); rebasing on origin/master …"
            git fetch origin master
            git rebase origin/master || { git rebase --abort; exit 1; }
            sleep $((attempt * 3))
          done

          echo "ERROR: failed to push after 5 attempts"
          exit 1
